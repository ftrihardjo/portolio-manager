app:
  id: "ari:cloud:ecosystem::app/07bbc7e7-e540-49bf-b835-6763e4aaaf3e"
  runtime:
    name: nodejs22.x
  licensing:
    enabled: true

modules:
  jira:globalPage:
    - key: portfolio-page
      resource: portfolio-ui
      resolver:
        function: resolver
      title: BPMN & Portfolio Manager
      layout: basic
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: portfolio-ui
    path: static/portfolio-ui/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - storage:app